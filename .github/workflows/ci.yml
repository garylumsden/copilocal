name: ci

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build -c Release --nologo

      - name: Test
        run: dotnet test tests/Copilocal.Tests/Copilocal.Tests.csproj -c Release --no-build --nologo

  aot:
    # Validate the Native AOT single-exe still links (catches trim/AOT regressions,
    # e.g. from a dependency bump) the way the release build does.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: AOT publish (win-x64)
        run: dotnet publish copilocal.csproj -c Release -r win-x64 -o out
