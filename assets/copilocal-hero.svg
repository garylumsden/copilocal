<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" role="img" aria-labelledby="title desc">
  <title id="title">copilocal hero image</title>
  <desc id="desc">Stylized terminal and model routing graphic for copilocal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a2858"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#5de0ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5de0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111933"/>
      <stop offset="100%" stop-color="#0a1128"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#42e8b4"/>
      <stop offset="100%" stop-color="#56b3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>
  <rect width="1400" height="700" fill="url(#glow)"/>

  <circle cx="200" cy="120" r="150" fill="#5de0ff" opacity="0.08"/>
  <circle cx="1240" cy="590" r="200" fill="#42e8b4" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="160" y="95" width="1080" height="510" rx="34" fill="url(#panel)" stroke="#243768" stroke-width="2"/>
  </g>

  <rect x="160" y="95" width="1080" height="62" rx="34" fill="#131f43"/>
  <circle cx="203" cy="126" r="8" fill="#ff6b6b"/>
  <circle cx="229" cy="126" r="8" fill="#ffd166"/>
  <circle cx="255" cy="126" r="8" fill="#42e8b4"/>

  <text x="700" y="133" text-anchor="middle" fill="#9fb5f5" font-size="22" font-family="Segoe UI, Arial, sans-serif">copilocal</text>

  <text x="240" y="248" fill="#dfe8ff" font-size="56" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Pick local model.</text>
  <text x="240" y="308" fill="#dfe8ff" font-size="56" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Launch Copilot CLI.</text>

  <rect x="238" y="352" width="476" height="170" rx="18" fill="#0d1736" stroke="#2a3d72" stroke-width="2"/>
  <text x="264" y="390" fill="#8db1ff" font-size="22" font-family="Consolas, Courier New, monospace">PS&gt; copilocal</text>
  <text x="264" y="428" fill="#6ce0b3" font-size="19" font-family="Consolas, Courier New, monospace">✓ Ollama      qwen2.5-coder:7b</text>
  <text x="264" y="460" fill="#6ce0b3" font-size="19" font-family="Consolas, Courier New, monospace">✓ Foundry     phi-4-mini</text>
  <text x="264" y="492" fill="#6ce0b3" font-size="19" font-family="Consolas, Courier New, monospace">✓ LM Studio   qwen3-0.6b</text>

  <g transform="translate(780 220)">
    <rect x="0" y="0" width="370" height="300" rx="26" fill="#0c1738" stroke="#2e4d8d" stroke-width="2"/>
    <rect x="38" y="52" width="294" height="196" rx="16" fill="#0a122a" stroke="#4167bb" stroke-width="2"/>
    <polyline points="78,116 112,145 78,174" fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="136" y1="175" x2="252" y2="175" stroke="#8ad7ff" stroke-width="12" stroke-linecap="round"/>
    <circle cx="62" cy="26" r="8" fill="#89a9ff"/>
    <circle cx="90" cy="26" r="8" fill="#89a9ff"/>
    <circle cx="118" cy="26" r="8" fill="#89a9ff"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#d9e7ff">
    <rect x="238" y="546" width="146" height="44" rx="22" fill="#12305b" stroke="#3d6cb6"/>
    <text x="311" y="575" text-anchor="middle">Ollama</text>
    <rect x="396" y="546" width="176" height="44" rx="22" fill="#12305b" stroke="#3d6cb6"/>
    <text x="484" y="575" text-anchor="middle">Foundry Local</text>
    <rect x="584" y="546" width="162" height="44" rx="22" fill="#12305b" stroke="#3d6cb6"/>
    <text x="665" y="575" text-anchor="middle">LM Studio</text>
  </g>
</svg>
