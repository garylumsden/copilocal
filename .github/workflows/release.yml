name: release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test tests/Copilocal.Tests/Copilocal.Tests.csproj -c Release --nologo

  build:
    needs: test
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            ext: ".exe"
          - rid: win-arm64
            os: windows-11-arm
            ext: ".exe"
          - rid: osx-arm64
            os: macos-15
            ext: ""
          - rid: osx-x64
            os: macos-15-intel
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        shell: pwsh
        run: dotnet publish copilocal.csproj -c Release -r ${{ matrix.rid }} -o out

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "out/copilocal${{ matrix.ext }}" "dist/copilocal-${{ matrix.rid }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v7
        with:
          name: copilocal-${{ matrix.rid }}
          path: dist/copilocal-${{ matrix.rid }}${{ matrix.ext }}

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA256
        run: |
          cd dist
          sha256sum copilocal-* | tee SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/copilocal-*
            dist/SHA256SUMS.txt
          generate_release_notes: true

  # Submit the new version's Windows installers to winget (microsoft/winget-pkgs).
  # Opt-in: set repo variable PUBLISH_WINGET=true and secret WINGET_TOKEN (a classic PAT
  # that can fork winget-pkgs). The first version must be published once manually
  # (e.g. `wingetcreate submit` or komac) before this can keep it updated. winget is
  # Windows-only, so only the win-x64/arm64 binaries are submitted (macOS is GitHub-only).
  winget:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_WINGET == 'true' }}
    steps:
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Gjlumsden.Copilocal
          # This workflow runs on the tag push (not a `release` event), so tell the action
          # which published release to read assets from.
          release-tag: ${{ github.ref_name }}
          installers-regex: 'copilocal-win-(x64|arm64)\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
