name: release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            ext: ".exe"
          - rid: win-arm64
            os: windows-11-arm
            ext: ".exe"
          - rid: osx-arm64
            os: macos-latest
            ext: ""
          - rid: osx-x64
            os: macos-13
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        shell: pwsh
        run: dotnet publish copilocal.csproj -c Release -r ${{ matrix.rid }} -o out

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "out/copilocal${{ matrix.ext }}" "dist/copilocal-${{ matrix.rid }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: copilocal-${{ matrix.rid }}
          path: dist/copilocal-${{ matrix.rid }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA256
        run: |
          cd dist
          sha256sum copilocal-* | tee SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/copilocal-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
